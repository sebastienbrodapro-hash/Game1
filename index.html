<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chronique Incrementale</title>
    <meta name="description" content="Jeu incremental historique avec arbre de progression, challenges et milestones.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img src="assets/chronicle.svg" alt="" draggable="false">
          <div>
            <p class="kicker">Tree incremental</p>
            <h1>Chronique</h1>
          </div>
        </div>

        <nav id="layoutNav" class="layout-nav" aria-label="Navigation principale"></nav>

        <div class="side-panel">
          <span class="panel-label">Epoque active</span>
          <strong id="activeEraName">Prehistoire</strong>
          <small id="activeEraRange">2.5M - 10 000 av. J.-C.</small>
        </div>

        <div class="side-panel">
          <span class="panel-label">Challenge</span>
          <strong id="activeChallengeName">Aucun</strong>
          <small id="activeChallengeInfo">Progression libre</small>
        </div>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <div id="resourceStrip" class="resource-strip" aria-label="Ressources"></div>
          <div class="toolbar">
            <span id="saveStatus" class="save-status">Sauvegarde prete</span>
            <button id="exportSave" class="tool-button" type="button">Exporter</button>
            <button id="importSave" class="tool-button" type="button">Importer</button>
            <button id="resetSave" class="tool-button danger" type="button">Reset</button>
          </div>
        </header>

        <section id="stage" class="stage" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="saveDialog" class="save-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <p class="kicker">Sauvegarde</p>
            <h2 id="dialogTitle">Exporter</h2>
          </div>
          <button class="icon-close" value="close" aria-label="Fermer">x</button>
        </div>
        <textarea id="savePayload" spellcheck="false"></textarea>
        <div class="dialog-actions">
          <button id="copySave" type="button">Copier</button>
          <button id="loadSave" type="button">Importer</button>
        </div>
      </form>
    </dialog>

    <script src="game.js"></script>
  </body>
</html>
